<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bemgu</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <meta name="theme-color" content="#1c1c1a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Bemgu">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <!-- Marketing-landing web fonts. Scoped to the Landing component via Tailwind
         font-['Fraunces']/font-['Inter']; the dashboard keeps its system/Georgia stack. -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;1,9..144,300;1,9..144,400&family=Inter:wght@400;500;600&display=swap">
    <script>
      (function () {
        window.__arrivlyInstall = { prompt: null, installed: false };
        window.addEventListener('beforeinstallprompt', function (e) {
          e.preventDefault();
          window.__arrivlyInstall.prompt = e;
          window.dispatchEvent(new Event('arrivly:installprompt'));
        });
        window.addEventListener('appinstalled', function () {
          window.__arrivlyInstall.installed = true;
          window.__arrivlyInstall.prompt = null;
          window.dispatchEvent(new Event('arrivly:installed'));
        });
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
